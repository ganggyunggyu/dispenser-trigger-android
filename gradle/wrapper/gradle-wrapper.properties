# Gradle Wrapper 설정 파일
# Gradle 버전을 프로젝트에 고정하여 모든 개발자가 동일한 버전 사용
#
# [왜 Wrapper를 사용하는가]
# - 로컬에 설치된 Gradle 버전과 무관하게 빌드 가능
# - 팀원 간 빌드 환경 일관성 유지
# - CI/CD 환경에서도 동일한 Gradle 버전 보장
#
# [수정 시 참고]
# - distributionUrl의 버전을 변경하면 해당 버전이 자동 다운로드됨
# - AGP(Android Gradle Plugin) 버전과 호환되는 Gradle 버전 사용 필수
# - 호환성 표: https://developer.android.com/studio/releases/gradle-plugin

distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.13-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
